<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔥 GROK SHOOTER - Real-Time Mayhem</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a001f;
            margin-top: 10px;
            color: #00ffcc;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            image-rendering: pixelated;
            padding: 10px;
            touch-action: none;
        }
        #game-container {
            position: relative;
            margin: auto;
            border: 8px solid #00ffcc;
            border-radius: 8px;
            box-shadow: 0 0 0 8px #ff00aa, 0 0 40px #00ffcc, inset 0 0 60px rgba(0, 255, 204, 0.3);
            background: #000;
            max-width: 100%;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            width: 100%;
            height: auto;
        }
        .hud {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 100;
            font-size: 16px;
            text-shadow: 0 0 10px #00ffcc;
        }
        .score { color: #ffff00; }
        .health {
            color: #ff0066;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .health-bar {
            width: 160px;
            height: 18px;
            background: #220022;
            border: 3px solid #ff0066;
            position: relative;
            overflow: hidden;
        }
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0066, #ff88cc);
            transition: width 0.2s;
            box-shadow: 0 0 15px #ff0066;
        }
        .title {
            position: absolute;
            top: -42px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff00aa;
            color: #fff;
            padding: 6px 24px;
            border: 6px solid #00ffcc;
            font-size: 24px;
            letter-spacing: 3px;
            box-shadow: 0 0 30px #ff00aa;
            z-index: 200;
        }
        .controls {
            position: absolute;
            bottom: 12px;
            left: 12px;
            font-size: 11px;
            background: rgba(0,0,0,0.8);
            padding: 8px;
            border: 3px solid #00ffcc;
            line-height: 1.3;
            display: none;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(170, 0, 50, 0.95);
            border: 10px solid #ffff00;
            padding: 30px 50px;
            text-align: center;
            box-shadow: 0 0 80px #ffff00;
            display: none;
            flex-direction: column;
            gap: 20px;
            z-index: 300;
        }
        button {
            font-family: 'Press Start 2P';
            background: #00ffcc;
            color: #0a001f;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px #00ffcc;
        }
        button:hover { transform: scale(1.1); background: #ffff00; }

        .wave {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ff00aa;
            color: white;
            padding: 6px 18px;
            border: 4px solid #00ffcc;
            font-size: 15px;
        }

        /* Mobile Virtual Controls */
        #virtual-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 200;
            display: none;
        }
        #fire-btn {
            position: absolute;
            bottom: 35px;
            right: 25px;
            width: 85px;
            height: 85px;
            background: rgba(255,20,100,0.25);
            border: 6px solid #ff0066;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 0 25px #ff0066;
            z-index: 200;
        }
        .joy {
            width: 120px;
            height: 120px;
            background: rgba(0,255,204,0.15);
            border: 5px solid #00ffcc;
            border-radius: 50%;
            position: relative;
        }
        .joy-knob {
            width: 48px;
            height: 48px;
            background: #00ffcc;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #00ffcc;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="title">GROK SHOOTER</div>
        <canvas id="game"></canvas>
        
        <!-- HUD -->
        <div class="hud">
            <div class="score">SCORE <span id="score">000000</span></div>
            <div class="health">
                ❤️
                <div class="health-bar">
                    <div id="health-fill" class="health-fill" style="width: 100%"></div>
                </div>
                <span id="health-text">100</span>
            </div>
            <div class="wave">WAVE <span id="wave">1</span></div>
        </div>

        <!-- Controls hint -->
        <div class="controls" id="controls-hint">
            WASD / ARROWS = MOVE<br>
            MOUSE = AIM + HOLD LEFT CLICK = RAPID FIRE
        </div>

        <!-- Virtual Mobile Controls -->
        <div id="virtual-controls">
            <div class="joy" id="joystick"><div class="joy-knob" id="knob"></div></div>
        </div>
        <div id="fire-btn">FIRE</div>

        <!-- Game Over -->
        <div id="game-over" class="game-over">
            <h1 style="color:#ffff00; font-size:42px; text-shadow: 0 0 20px #ffff00;">GAME OVER</h1>
            <div style="font-size:24px; color:#00ffcc;">FINAL SCORE: <span id="final-score" style="color:#ffff00">000000</span></div>
            <div style="font-size:18px; margin:10px 0;">HIGH SCORE: <span id="high-score">000000</span></div>
            <button onclick="restartGame()">RESTART MISSION</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const healthFill = document.getElementById('health-fill');
        const healthText = document.getElementById('health-text');
        const waveEl = document.getElementById('wave');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        const highScoreEl = document.getElementById('high-score');

        let WIDTH = 1000, HEIGHT = 600;
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        function resizeCanvas() {
            if (isMobile) {
                WIDTH = Math.min(window.innerWidth - 20, 900);
                HEIGHT = Math.min(window.innerHeight - 140, 600);
            }
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Game variables
        let player = { x: WIDTH/2, y: HEIGHT/2, size: 28, speed: 6.5, angle: 0, health: 100, lastShot: 0, lastHit: 0 };
        let bullets = [], enemies = [], particles = [], score = 0, wave = 1;
        let lastSpawn = Date.now(), spawnRate = 800, gameRunning = true;
        let highScore = localStorage.getItem('grokShooterHigh') || 0;
        highScoreEl.textContent = String(highScore).padStart(6, '0');

        // Audio (unchanged)
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        playGunSound()
        playExplosionSound(intensity = 1) 

        // Input
        const keys = {};
        let mouseX = WIDTH/2, mouseY = HEIGHT/2;
        let mouseDown = false;

        // Mobile virtual controls
        let moveDirX = 0, moveDirY = 0;
        let joystickActive = false;
        let joyCenterX, joyCenterY;
        const joystick = document.getElementById('joystick');
        const knob = document.getElementById('knob');
        const fireBtn = document.getElementById('fire-btn');
        const controlsHint = document.getElementById('controls-hint');

        if (isMobile) {
            joystick.style.display = 'block';
            fireBtn.style.display = 'flex';
            controlsHint.style.display = 'none';
        } else {
            controlsHint.style.display = 'block';
        }

        // Background stars
        let stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({ x: Math.random()*WIDTH, y: Math.random()*HEIGHT, size: Math.random()*3+1, speed: Math.random()*0.8+0.3 });
        }

        // === Your existing functions (createBullet, spawnEnemy, createExplosion, update, draw, etc.) ===
        // I kept them exactly as you had, only added mobile movement

        function createBullet() {
            const now = Date.now()
            if (now - player.lastShot < 110) return // fire rate
            playGunSound();
            const dx = mouseX - player.x
            const dy = mouseY - player.y
            const dist = Math.hypot(dx, dy) || 1
            
            bullets.push({
                x: player.x,
                y: player.y,
                vx: (dx / dist) * 18,
                vy: (dy / dist) * 18,
                life: 55,
                color: '#ffff00'
            })
            
            // Muzzle flash particle
            for (let i = 0; i < 8; i++) {
                const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.8
                particles.push({
                    x: player.x,
                    y: player.y,
                    vx: Math.cos(angle) * (8 + Math.random() * 6),
                    vy: Math.sin(angle) * (8 + Math.random() * 6),
                    life: 12,
                    color: '#ff8800',
                    size: 6
                })
            }
            
            player.lastShot = now
        }

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4)
            let ex, ey
            
            switch(side) {
                case 0: // top
                    ex = Math.random() * canvas.width
                    ey = -40
                    break
                case 1: // right
                    ex = canvas.width + 40
                    ey = Math.random() * canvas.height
                    break
                case 2: // bottom
                    ex = Math.random() * canvas.width
                    ey = canvas.height + 40
                    break
                case 3: // left
                    ex = -40
                    ey = Math.random() * canvas.height
                    break
            }
            
            const enemySpeed = 2.2 + wave * 0.3
            enemies.push({
                x: ex,
                y: ey,
                size: 32,
                speed: enemySpeed,
                health: 2 + Math.floor(wave / 2),
                color: '#ff0066'
            })
        }

        function createExplosion(x, y, intensity = 1) {
            playExplosionSound(intensity);
            for (let i = 0; i < 22 * intensity; i++) {
                const angle = Math.random() * Math.PI * 2
                const vel = 3 + Math.random() * 7
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * vel,
                    vy: Math.sin(angle) * vel,
                    life: 22 + Math.random() * 18,
                    color: Math.random() > 0.5 ? '#ffff00' : '#ff4400',
                    size: 4 + Math.random() * 5
                })
            }
            
            // Shockwave
            particles.push({
                x: x,
                y: y,
                life: 14,
                size: 8,
                color: '#ffffff',
                isShock: true
            })
        }
   function draw() {
            // Background
            ctx.fillStyle = '#0a001f'
            ctx.fillRect(0, 0, canvas.width, canvas.height)
            
            // Stars
            ctx.fillStyle = '#ffffff'
            for (let star of stars) {
                ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 200 + star.x) * 0.4
                ctx.fillRect(star.x, star.y, star.size, star.size)
                star.y += star.speed
                if (star.y > canvas.height) star.y = 0
            }
            ctx.globalAlpha = 1
            
            // Grid floor effect
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.08)'
            ctx.lineWidth = 2
            for (let x = 0; x < canvas.width; x += 60) {
                ctx.beginPath()
                ctx.moveTo(x, 0)
                ctx.lineTo(x, canvas.height)
                ctx.stroke()
            }
            for (let y = 0; y < canvas.height; y += 60) {
                ctx.beginPath()
                ctx.moveTo(0, y)
                ctx.lineTo(canvas.width, y)
                ctx.stroke()
            }
            
            // Draw enemies
            for (let e of enemies) {
                ctx.save()
                ctx.translate(e.x, e.y)
                ctx.rotate(Math.atan2(player.y - e.y, player.x - e.x))
                
                // Enemy body
                ctx.fillStyle = e.color
                ctx.fillRect(-e.size/2, -e.size/2 * 0.7, e.size, e.size * 1.4)
                
                // Spikes
                ctx.fillStyle = '#ff88cc'
                for (let i = 0; i < 6; i++) {
                    const ang = i * (Math.PI * 2 / 6)
                    ctx.fillRect(e.size/2 - 4, -4, 18, 8)
                    ctx.rotate(Math.PI * 2 / 6)
                }
                
                ctx.restore()
                
                // Health pip
                if (e.health > 2) {
                    ctx.fillStyle = '#00ff88'
                    ctx.fillRect(e.x - 18, e.y - e.size/2 - 14, 36 * (e.health / (2 + Math.floor(wave/2))), 6)
                }
            }
            
            // Draw bullets
            for (let b of bullets) {
                ctx.shadowBlur = 20
                ctx.shadowColor = '#ffff00'
                ctx.fillStyle = b.color
                ctx.fillRect(b.x - 4, b.y - 4, 8, 8)
                ctx.shadowBlur = 0
            }
            
            // Draw player (cyber ship)
            ctx.save()
            ctx.translate(player.x, player.y)
            ctx.rotate(player.angle)
            
            // Thruster glow
            ctx.shadowBlur = 30
            ctx.shadowColor = '#00ffff'
            ctx.fillStyle = '#00ffff'
            ctx.fillRect(-22, -9, 14, 18)
            
            // Main ship body
            ctx.shadowBlur = 0
            ctx.fillStyle = '#00ffcc'
            ctx.beginPath()
            ctx.moveTo(22, 0)           // nose
            ctx.lineTo(-18, -18)
            ctx.lineTo(-12, 0)
            ctx.lineTo(-18, 18)
            ctx.closePath()
            ctx.fill()
            
            // Cockpit
            ctx.fillStyle = '#ff00ff'
            ctx.fillRect(-4, -7, 14, 14)
            
            // Wings
            ctx.fillStyle = '#00aaff'
            ctx.fillRect(-18, -22, 12, 8)
            ctx.fillRect(-18, 14, 12, 8)
            
            ctx.restore()
            
            // Particles
            for (let p of particles) {
                ctx.globalAlpha = p.life / 25
                if (p.isShock) {
                    ctx.strokeStyle = p.color
                    ctx.lineWidth = 4
                    ctx.beginPath()
                    ctx.arc(p.x, p.y, 40 - p.life * 2.8, 0, Math.PI * 2)
                    ctx.stroke()
                } else {
                    ctx.fillStyle = p.color
                    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size)
                }
            }
            ctx.globalAlpha = 1
            
            // Vignette
            const grad = ctx.createRadialGradient(
                player.x, player.y, 80,
                player.x, player.y, 520
            )
            grad.addColorStop(0, 'transparent')
            grad.addColorStop(1, 'rgba(10,0,31,0.75)')
            ctx.fillStyle = grad
            ctx.fillRect(0, 0, canvas.width, canvas.height)
        }

        function gameLoop() {
            update()
            draw()
            requestAnimationFrame(gameLoop)
        }

        function endGame() {
            gameOverScreen.style.display = 'flex'
            finalScoreEl.textContent = String(Math.floor(score)).padStart(6, '0')
            
            if (score > highScore) {
                highScore = score
                localStorage.setItem('grokShooterHigh', highScore)
                highScoreEl.textContent = String(highScore).padStart(6, '0')
            }
        }

        function restartGame() {
            // Reset everything
            player.x = 500
            player.y = 350
            player.health = 100
            bullets = []
            enemies = []
            particles = []
            score = 0
            wave = 1
            spawnRate = 800
            lastSpawn = Date.now()
            gameRunning = true
            gameOverScreen.style.display = 'none'
            
            scoreEl.textContent = '000000'
            waveEl.textContent = '1'
            healthFill.style.width = '100%'
            healthText.textContent = '100'
        }

        // ... (keep your spawnEnemy, createExplosion, update, draw, gameLoop, endGame, restartGame exactly as before)

        // Updated movement in update()
        function update() {
            if (!gameRunning) return;

            // Desktop + Mobile movement
            let dx = 0, dy = 0;
            if (keys['w'] || keys['ArrowUp']) dy -= 1;
            if (keys['s'] || keys['ArrowDown']) dy += 1;
            if (keys['a'] || keys['ArrowLeft']) dx -= 1;
            if (keys['d'] || keys['ArrowRight']) dx += 1;

            if (isMobile) {
                dx += moveDirX;
                dy += moveDirY;
            }

            if (dx || dy) {
                const len = Math.hypot(dx, dy) || 1;
                player.x += (dx / len) * player.speed;
                player.y += (dy / len) * player.speed;
            }

            player.x = Math.max(30, Math.min(WIDTH - 30, player.x));
            player.y = Math.max(30, Math.min(HEIGHT - 30, player.y));

            // Aim
            const dxMouse = mouseX - player.x;
            const dyMouse = mouseY - player.y;
            player.angle = Math.atan2(dyMouse, dxMouse);

            if (mouseDown || (isMobile && fireBtn.style.opacity === '1')) createBullet();

            // ... rest of your update() code remains exactly the same (bullets, enemies, collisions, spawn, particles, HUD) ...
        }

        // Touch controls
        joystick.addEventListener('touchstart', e => {
            joystickActive = true;
            const r = joystick.getBoundingClientRect();
            joyCenterX = r.left + 60;
            joyCenterY = r.top + 60;
        });

        document.addEventListener('touchmove', e => {
            if (!joystickActive) return;
            const t = e.touches[0];
            let dx = t.clientX - joyCenterX;
            let dy = t.clientY - joyCenterY;
            const dist = Math.hypot(dx, dy);
            const max = 50;
            if (dist > max) { dx = dx/dist * max; dy = dy/dist * max; }
            knob.style.transform = `translate(${dx}px, ${dy}px)`;
            moveDirX = dx / max;
            moveDirY = dy / max;
        });

        document.addEventListener('touchend', () => {
            joystickActive = false;
            moveDirX = moveDirY = 0;
            knob.style.transform = 'translate(0px, 0px)';
        });

        fireBtn.addEventListener('touchstart', e => { mouseDown = true; e.preventDefault(); });
        fireBtn.addEventListener('touchend', () => mouseDown = false);

        // Desktop controls (unchanged)
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', () => mouseDown = true);
        canvas.addEventListener('mouseup', () => mouseDown = false);

        // Touch fallback for aiming
        canvas.addEventListener('touchmove', e => {
            if (e.touches.length > 0) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.touches[0].clientX - rect.left;
                mouseY = e.touches[0].clientY - rect.top;
            }
        });

        // Audio resume
        canvas.addEventListener('mousedown', () => { if (audioContext.state === 'suspended') audioContext.resume(); }, { once: true });
        canvas.addEventListener('touchstart', () => { if (audioContext.state === 'suspended') audioContext.resume(); }, { once: true });

        // Start
        console.log('%c🚀 GROK SHOOTER - Mobile Ready!', 'color:#00ffcc; font-size:18px');
        gameLoop();
    </script>
</body>
</html>
