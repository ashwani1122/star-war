<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 GROK SHOOTER - Real-Time Mayhem</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a001f;
            color: #00ffcc;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            image-rendering: pixelated;  
        }
        #game-container {
            position: relative;
            margin: 10px auto;
            border: 8px solid #00ffcc;
            box-shadow: 
                0 0 0 8px #ff00aa,
                0 0 40px #00ffcc,
                inset 0 0 60px rgba(0, 255, 204, 0.3);
            background: #000;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        .hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 100;
            font-size: 18px;
            text-shadow: 0 0 10px #00ffcc;
        }
        .score {
            color: #ffff00;
        }
        .health {
            color: #ff0066;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .health-bar {
            width: 180px;
            height: 20px;
            background: #220022;
            border: 3px solid #ff0066;
            position: relative;
            overflow: hidden;
        }
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0066, #ff88cc);
            transition: width 0.2s;
            box-shadow: 0 0 15px #ff0066;
        }
        .title {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff00aa;
            color: #fff;
            padding: 8px 30px;
            border: 6px solid #00ffcc;
            font-size: 28px;
            letter-spacing: 4px;
            box-shadow: 0 0 30px #ff00aa;
            white-space: nowrap;
            z-index: 200;
        }
        .controls {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border: 3px solid #00ffcc;
            line-height: 1.4;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(170, 0, 50, 0.95);
            border: 10px solid #ffff00;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 0 80px #ffff00;
            display: none;
            flex-direction: column;
            gap: 20px;
            z-index: 300;
        }
        button {
            font-family: 'Press Start 2P';
            background: #00ffcc;
            color: #0a001f;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px #00ffcc;
            transition: all 0.2s;
        }
        button:hover {
            transform: scale(1.1);
            background: #ffff00;
        }
        .wave {
            top: 15px;
            right: 15px;
            background: #ff00aa;
            color: white;
            padding: 8px 20px;
            border: 4px solid #00ffcc;
            font-size: 16px;
        }
        .both{
            display: flex;
            align-items: center;
            justify-content: space-around;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="1500" height="650"></canvas>
        <div id="landing-text" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:32px; color:#00ff88; text-shadow:0 0 30px #00ff88; z-index:300; display:none;">
    LANDING ON EARTH...
</div>
        <!-- HUD -->
        <div class="hud">
            <div class="score">SCORE <span id="score">000000</span></div>
           <div class="both"> <div class="health">
                ❤️
                <div class="health-bar">
                    <div id="health-fill" class="health-fill" style="width: 100%"></div>
                </div>
                <span id="health-text">100</span>
            </div>
            
            <div class="wave">WAVE <span id="wave">1</span></div></div> 
           
        </div>

        <!-- Controls hint -->
     <div id="controls" class="controls">
            WASD / ARROWS = MOVE<br>
            MOUSE = AIM + HOLD LEFT CLICK = RAPID FIRE<br>
            KILL EVERYTHING 🔥
        </div>

        <!-- Game Over -->
        <div id="game-over" class="game-over">
            <h1 style="color:#ffff00; font-size:42px; text-shadow: 0 0 20px #ffff00;">GAME OVER</h1>
            <div style="font-size:24px; color:#00ffcc;">FINAL SCORE: <span id="final-score" style="color:#ffff00">000000</span></div>
            <div style="font-size:18px; margin:10px 0;">HIGH SCORE: <span id="high-score">000000</span></div>
            <button onclick="restartGame()">RESTART MISSION</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game')
        const ctx = canvas.getContext('2d')
        const scoreEl = document.getElementById('score')
        const healthFill = document.getElementById('health-fill')
        const healthText = document.getElementById('health-text')
        const waveEl = document.getElementById('wave')
        const gameOverScreen = document.getElementById('game-over')
        const finalScoreEl = document.getElementById('final-score')
        const highScoreEl = document.getElementById('high-score')

        // Game variables
        let player = {
            x: 500,
            y: 350,
            size: 28,
            speed: 6.5,
            angle: 0,
            health: 100,
            lastShot: 0,
            lastHit: 0
        }
        let planets = [];
        let onEarth = false;
        let bullets = []
        let enemies = []
        let particles = []
        let score = 0
        let wave = 1
        let lastSpawn = 0
        let spawnRate = 800
        let gameRunning = true
        let highScore = localStorage.getItem('grokShooterHigh') || 0
        // === AUDIO SYSTEM ===
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playGunSound() {
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            const filter = audioContext.createBiquadFilter();
            console.log(`this is the planets ${planets}`)
            oscillator.type = 'sawtooth';           // Harsh gun feel
            oscillator.frequency.setValueAtTime(180, audioContext.currentTime);
            
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1200, audioContext.currentTime);
            
            gain.gain.setValueAtTime(0.6, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.18);
            
            oscillator.connect(filter);
            filter.connect(gain);
            gain.connect(audioContext.destination);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.22);
            
            // Quick noise burst for realism
            const noise = audioContext.createBufferSource();
            const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.1, audioContext.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = noiseBuffer;
            
            const noiseGain = audioContext.createGain();
            noiseGain.gain.setValueAtTime(0.4, audioContext.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.08);
            
            const noiseFilter = audioContext.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.value = 1800;
            
            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioContext.destination);
            noise.start();
        }
        
        function createEarthPlanet() {
            alert("planet is created")
        planets = [{
            x: WIDTH * 0.72,
            y: HEIGHT * 0.38,
            radius: 75,
            type: 'earth',
            rotation: 0            
        }];

        console.log(`this is the planets ${planets}`)
    }

        function landOnEarth() {
    if (onEarth) return;
    onEarth = true;
    
    // Cartoon landing effect
    document.getElementById('landing-text').style.display = 'block'; // add this div in HTML if not present
    setTimeout(() => {
        document.getElementById('landing-text').style.display = 'none';
    }, 2000);
    
    // Clear space enemies
    enemies = [];
    bullets = [];
    
    // Spawn cartoon Earth enemies (green aliens/zombies)
    for (let i = 0; i < 8; i++) {
        enemies.push({
            x: 150 + Math.random() * (WIDTH - 300),
            y: 100 + Math.random() * (HEIGHT - 250),
            size: 34,
            speed: 2.1,
            health: 5,
            color: '#22cc44',
            type: 'earth'
        });
    }
    
    // Change background to green Earth feel
    ctx.fillStyle = '#113300'; // grass color
}
        function playExplosionSound(intensity = 1) {
            const noise = audioContext.createBufferSource();
            const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.6, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < data.length; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            noise.buffer = buffer;
            
            const gain = audioContext.createGain();
            gain.gain.value = 1.2 * intensity;
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.6);
            
            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, audioContext.currentTime);
            filter.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.7);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioContext.destination);
            noise.start();
        }
        highScoreEl.textContent = String(highScore).padStart(6, '0')

        // Input
        const keys = {}
        let mouseX = 500
        let mouseY = 350
        let mouseDown = false

        // Background stars
        let stars = []
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 3 + 1,
                speed: Math.random() * 0.8 + 0.3
            })
        }

        function createBullet() {
            const now = Date.now()
            if (now - player.lastShot < 110) return // fire rate
            playGunSound();
            const dx = mouseX - player.x
            const dy = mouseY - player.y
            const dist = Math.hypot(dx, dy) || 1
            
            bullets.push({
                x: player.x,
                y: player.y,
                vx: (dx / dist) * 18,
                vy: (dy / dist) * 18,
                life: 55,
                color: '#ffff00'
            })
            
            // Muzzle flash particle
            for (let i = 0; i < 8; i++) {
                const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.8
                particles.push({
                    x: player.x,
                    y: player.y,
                    vx: Math.cos(angle) * (8 + Math.random() * 6),
                    vy: Math.sin(angle) * (8 + Math.random() * 6),
                    life: 12,
                    color: '#ff8800',
                    size: 6
                })
            }
            
            player.lastShot = now
        }

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4)
            let ex, ey
            
            switch(side) {
                case 0: // top
                    ex = Math.random() * canvas.width
                    ey = -40
                    break
                case 1: // right
                    ex = canvas.width + 40
                    ey = Math.random() * canvas.height
                    break
                case 2: // bottom
                    ex = Math.random() * canvas.width
                    ey = canvas.height + 40
                    break
                case 3: // left
                    ex = -40
                    ey = Math.random() * canvas.height
                    break
            }
            
            const enemySpeed = 2.2 + wave * 0.3
            enemies.push({
                x: ex,
                y: ey,
                size: 32,
                speed: enemySpeed,
                health: 2 + Math.floor(wave / 2),
                color: '#ff0066'
            })
        }

        function createExplosion(x, y, intensity = 1) {
            playExplosionSound(intensity);
            for (let i = 0; i < 22 * intensity; i++) {
                const angle = Math.random() * Math.PI * 2
                const vel = 3 + Math.random() * 7
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * vel,
                    vy: Math.sin(angle) * vel,
                    life: 22 + Math.random() * 18,
                    color: Math.random() > 0.5 ? '#ffff00' : '#ff4400',
                    size: 4 + Math.random() * 5
                })
            }
            
            // Shockwave
            particles.push({
                x: x,
                y: y,
                life: 14,
                size: 8,
                color: '#ffffff',
                isShock: true
            })
        }
        function update() {
            if (!gameRunning) return
                        // Earth landing
            if (!onEarth) {
                for (let p of planets) {
                    if (p.type === 'earth' && Math.hypot(player.x - p.x, player.y - p.y) < p.radius + player.size) {
                        landOnEarth();
                    }
                }
            }
            // Player movement
            let dx = 0, dy = 0
            if (keys['w'] || keys['ArrowUp']) dy -= 1
            if (keys['s'] || keys['ArrowDown']) dy += 1
            if (keys['a'] || keys['ArrowLeft']) dx -= 1
            if (keys['d'] || keys['ArrowRight']) dx += 1
            
            if (dx || dy) {
                const len = Math.hypot(dx, dy)
                player.x += (dx / len) * player.speed
                player.y += (dy / len) * player.speed
            }
            
            // Keep player in bounds
            player.x = Math.max(30, Math.min(canvas.width - 30, player.x))
            player.y = Math.max(30, Math.min(canvas.height - 30, player.y))
            
            // Aim angle
            const dxMouse = mouseX - player.x
            const dyMouse = mouseY - player.y
            player.angle = Math.atan2(dyMouse, dxMouse)
            
            // Auto fire
            if (mouseDown) createBullet()
            
            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i]
                b.x += b.vx
                b.y += b.vy
                b.life--
                if (b.life <= 0 || b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1)
                }
            }
            
            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i]
                const dx = player.x - e.x
                const dy = player.y - e.y
                const dist = Math.hypot(dx, dy) || 1
                
                e.x += (dx / dist) * e.speed
                e.y += (dy / dist) * e.speed
                
                const now = Date.now()
                if (Math.hypot(e.x - player.x, e.y - player.y) < player.size/1.8 + e.size/1.8) {
                    if (now - player.lastHit > 420) {
                        player.health -= 22
                        player.lastHit = now
                        createExplosion(e.x, e.y, 0.6)
                        e.x -= (dx / dist) * 40
                        e.y -= (dy / dist) * 40
                        
                        if (player.health <= 0) {
                            gameRunning = false
                            endGame()
                        }
                    }
                }
            }
            
            // Bullet-enemy collision
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i]
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j]
                    if (Math.hypot(b.x - e.x, b.y - e.y) < e.size / 2 + 6) {
                        e.health--
                        bullets.splice(i, 1)
                        
                        for (let k = 0; k < 9; k++) {
                            particles.push({
                                x: b.x, y: b.y,
                                vx: (Math.random() - 0.5) * 12,
                                vy: (Math.random() - 0.5) * 12,
                                life: 16,
                                color: '#00ffff',
                                size: 3
                            })
                        }
                        
                        if (e.health <= 0) {
                            score += 100 + wave * 25
                            createExplosion(e.x, e.y)
                            enemies.splice(j, 1)
                        }
                        break
                    }
                }
            }
            
            // Spawn enemies
            if (Date.now() - lastSpawn > spawnRate) {
               
                const enemiesThisWave = 1 + Math.floor(wave / 2)
                for (let i = 0; i < enemiesThisWave; i++) {
                    spawnEnemy()
                }
                lastSpawn = Date.now()
            }
            
            // === WAVE PROGRESSION (Fixed & Clean) ===
            if (enemies.length >10) {
                    // alert("hello world ")

                if (Date.now() - lastSpawn > 600) {    
                    // 1.4 seconds after clearing
                    wave++
                    waveEl.textContent = wave
                    
                    // Flash effect
                    waveEl.style.color = '#ffff00'
                    setTimeout(() => waveEl.style.color = 'white', 700)
                    
                    console.log(`Wave ${wave} started!`)
                    
                    spawnRate = Math.max(320, spawnRate - 55)
                    score += wave * 350
                    
                    lastSpawn = Date.now()
                }
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]
                p.x += p.vx || 0
                p.y += p.vy || 0
                p.life--
                if (p.life <= 0) particles.splice(i, 1)
            }
            
            // Update HUD
            scoreEl.textContent = String(Math.floor(score)).padStart(6, '0')
            const healthPercent = Math.max(0, player.health)
            healthFill.style.width = healthPercent + '%'
            healthText.textContent = Math.floor(healthPercent)
            
            if (healthPercent < 30) {
                healthFill.style.background = 'linear-gradient(90deg, #ff0000, #ff8800)'
            }
        }
        function draw() {
            // Background
            ctx.fillStyle = '#0a001f'
            ctx.fillRect(0, 0, canvas.width, canvas.height)
            
            // Stars
            ctx.fillStyle = '#ffffff'
            for (let star of stars) {
                ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 200 + star.x) * 0.4
                ctx.fillRect(star.x, star.y, star.size, star.size)
                star.y += star.speed
                if (star.y > canvas.height) star.y = 0
            }
            ctx.globalAlpha = 1
                    // === DRAW EARTH PLANET (Put this inside your draw() function) ===
for (let p of planets) {

    alert("hi there")
    if (p.type === 'earth') {
        p.rotation += 0.003;   // slow rotation

        // Outer glow
        ctx.shadowBlur = 70;
        ctx.shadowColor = '#66ffcc';
        ctx.fillStyle = 'rgba(34, 136, 255, 0.6)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius + 18, 0, Math.PI * 2);
        ctx.fill();

        // Main Planet Body (Blue Ocean)
        ctx.shadowBlur = 40;
        ctx.shadowColor = '#44ddff';
        ctx.fillStyle = '#2288ff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();

        // Cartoon Continents (Green)
        ctx.fillStyle = '#00bb44';
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);

        // Big continent 1
        ctx.beginPath();
        ctx.ellipse(-12, -18, 34, 26, 0.7, 0, Math.PI * 2);
        ctx.fill();

        // Continent 2
        ctx.beginPath();
        ctx.ellipse(25, 15, 29, 19, -0.9, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        // White Clouds
        ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
        ctx.beginPath();
        ctx.arc(p.x - 28, p.y - 26, 13, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x + 22, p.y - 19, 11, 0, Math.PI * 2);
        ctx.fill();

        // Highlight / Atmosphere
        ctx.strokeStyle = 'rgba(180, 255, 255, 0.6)';
        ctx.lineWidth = 12;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius + 6, 0, Math.PI * 2);
        ctx.stroke();
    }
} // Grid floor effect
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.08)'
            ctx.lineWidth = 2
            for (let x = 0; x < canvas.width; x += 60) {
                ctx.beginPath()
                ctx.moveTo(x, 0)
                ctx.lineTo(x, canvas.height)
                ctx.stroke()
            }
            for (let y = 0; y < canvas.height; y += 60) {
                ctx.beginPath()
                ctx.moveTo(0, y)
                ctx.lineTo(canvas.width, y)
                ctx.stroke()
            }
            
            // Draw enemies
            for (let e of enemies) {
                ctx.save()
                ctx.translate(e.x, e.y)
                ctx.rotate(Math.atan2(player.y - e.y, player.x - e.x))
                
                // Enemy body
                ctx.fillStyle = e.color
                ctx.fillRect(-e.size/2, -e.size/2 * 0.7, e.size, e.size * 1.4)
                
                // Spikes
                ctx.fillStyle = '#ff88cc'
                for (let i = 0; i < 6; i++) {
                    const ang = i * (Math.PI * 2 / 6)
                    ctx.fillRect(e.size/2 - 4, -4, 18, 8)
                    ctx.rotate(Math.PI * 2 / 6)
                }
                
                ctx.restore()
                
                // Health pip
                if (e.health > 2) {
                    ctx.fillStyle = '#00ff88'
                    ctx.fillRect(e.x - 18, e.y - e.size/2 - 14, 36 * (e.health / (2 + Math.floor(wave/2))), 6)
                }
            }
            
            // Draw bullets
            for (let b of bullets) {
                ctx.shadowBlur = 20
                ctx.shadowColor = '#ffff00'
                ctx.fillStyle = b.color
                ctx.fillRect(b.x - 4, b.y - 4, 8, 8)
                ctx.shadowBlur = 0
            }
            
            // Draw player (cyber ship)
            ctx.save()
            ctx.translate(player.x, player.y)
            ctx.rotate(player.angle)
            
            // Thruster glow
            ctx.shadowBlur = 30
            ctx.shadowColor = '#00ffff'
            ctx.fillStyle = '#00ffff'
            ctx.fillRect(-22, -9, 14, 18)
            
            // Main ship body
            ctx.shadowBlur = 0
            ctx.fillStyle = '#00ffcc'
            ctx.beginPath()
            ctx.moveTo(22, 0)           // nose
            ctx.lineTo(-18, -18)
            ctx.lineTo(-12, 0)
            ctx.lineTo(-18, 18)
            ctx.closePath()
            ctx.fill()
            
            // Cockpit
            ctx.fillStyle = '#ff00ff'
            ctx.fillRect(-4, -7, 14, 14)
            
            // Wings
            ctx.fillStyle = '#00aaff'
            ctx.fillRect(-18, -22, 12, 8)
            ctx.fillRect(-18, 14, 12, 8)
            
            ctx.restore()
            
            // Particles
            for (let p of particles) {
                ctx.globalAlpha = p.life / 25
                if (p.isShock) {
                    ctx.strokeStyle = p.color
                    ctx.lineWidth = 4
                    ctx.beginPath()
                    ctx.arc(p.x, p.y, 40 - p.life * 2.8, 0, Math.PI * 2)
                    ctx.stroke()
                } else {
                    ctx.fillStyle = p.color
                    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size)
                }
            }
            ctx.globalAlpha = 1
            
            // Vignette
            const grad = ctx.createRadialGradient(
                player.x, player.y, 80,
                player.x, player.y, 520
            )
            grad.addColorStop(0, 'transparent')
            grad.addColorStop(1, 'rgba(10,0,31,0.75)')
            ctx.fillStyle = grad
            ctx.fillRect(0, 0, canvas.width, canvas.height)
        }

        function gameLoop() {
            update()
            draw()
            requestAnimationFrame(gameLoop)
        }

        function endGame() {
            gameOverScreen.style.display = 'flex'
            finalScoreEl.textContent = String(Math.floor(score)).padStart(6, '0')
            
            if (score > highScore) {
                highScore = score
                localStorage.setItem('grokShooterHigh', highScore)
                highScoreEl.textContent = String(highScore).padStart(6, '0')
            }
        }

            function restartGame() {
                alert("planet is created before")
                createEarthPlanet();
                alert("planet is created")
            player.x = canvas.width / 2
            player.y = canvas.height / 2
            player.health = 100
            bullets = []
            enemies = []
            particles = []
            score = 0
            wave = 1
            spawnRate = 800
            lastSpawn = Date.now() - 1000   // important
            gameRunning = true
            gameOverScreen.style.display = 'none'
            
            scoreEl.textContent = '000000'
            waveEl.textContent = '1'
            healthFill.style.width = '100%'
            healthText.textContent = '100'

        }
        // Event listeners
        window.addEventListener('keydown', e => {
            keys[e.key] = true
            if (e.key === 'r' || e.key === 'R') {
                if (!gameRunning) restartGame() 

            }
        })
        
        window.addEventListener('keyup', e => keys[e.key] = false)
        
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect()
            mouseX = e.clientX - rect.left
            mouseY = e.clientY - rect.top
        })
        
        canvas.addEventListener('mousedown', e => {
            if (e.button === 0) mouseDown = true
        })
        
        canvas.addEventListener('mouseup', e => {
            if (e.button === 0) mouseDown = false
        })
        setTimeout(() => {
            const el = document.getElementById("controls");
            el.style.display = "none";
        }, 5000); // 3000 ms = 3 seconds
        // Touch support for mobile
        canvas.addEventListener('touchmove', e => {
            if (e.touches.length > 0) {
                const rect = canvas.getBoundingClientRect()
                mouseX = e.touches[0].clientX - rect.left
                mouseY = e.touches[0].clientY - rect.top
            }
        })
        
        canvas.addEventListener('touchstart', e => {
            mouseDown = true
            e.preventDefault()
        })
        
        canvas.addEventListener('touchend', () => mouseDown = false)
        
        // Start the game!
        console.log('%c🚀 GROK SHOOTER initialized - real-time shooting mayhem ready!', 'color:#00ffcc; font-size:18px')
        gameLoop()
        
        // Easter egg: press G for god mode (just for fun)
        let secret = ''
        document.addEventListener('keypress', e => {
            secret += e.key
            if (secret.includes('grok')) {
                player.health = 999
                score += 5000
                secret = ''
            }
        canvas.addEventListener('mousedown', () => {
    if (audioContext.state === 'suspended') audioContext.resume();
}, { once: true });})
    </script>
