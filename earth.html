<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 GROK SHOOTER - Real-Time Mayhem</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a001f; color: #00ffcc; font-family: 'Press Start 2P', system-ui; overflow: hidden; height: 100vh; image-rendering: pixelated; }
        #game-container { position: relative; margin: 10px auto; border: 8px solid #00ffcc; box-shadow: 0 0 0 8px #ff00aa, 0 0 40px #00ffcc; background: #000; }
        canvas { display: block; image-rendering: pixelated; }
        .hud { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 100; font-size: 18px; text-shadow: 0 0 10px #00ffcc; }
        .title { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: #ff00aa; color: #fff; padding: 8px 30px; border: 6px solid #00ffcc; font-size: 28px; z-index: 200; }
        .galaxy-text { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); font-size: 26px; color: #00ffff; text-shadow: 0 0 20px #00ffff; z-index: 250; opacity: 0; transition: 1s; }
        .landing-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; color: #00ff88; text-shadow: 0 0 30px #00ff88; z-index: 300; display: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="title">GROK SHOOTER</div>
        <canvas id="game" width="1500" height="650"></canvas>
        
        <div class="hud">
            <div class="score">SCORE <span id="score">000000</span></div>
            <div style="display:flex; align-items:center; gap:20px;">
                <div class="health">❤️ <div class="health-bar"><div id="health-fill" class="health-fill" style="width:100%"></div></div> <span id="health-text">100</span></div>
                <div class="wave">WAVE <span id="wave">1</span></div>
            </div>
        </div>

        <div id="galaxy-text" class="galaxy-text"></div>
        <div id="landing-text" class="landing-text">LANDING ON EARTH...</div>

        <div id="game-over" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(170,0,50,0.95);border:10px solid #ffff00;padding:40px 60px;text-align:center;box-shadow:0 0 80px #ffff00;display:none;flex-direction:column;gap:20px;z-index:300;">
            <h1 style="color:#ffff00;font-size:42px;text-shadow:0 0 20px #ffff00;">GAME OVER</h1>
            <button onclick="restartGame()">RESTART</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let WIDTH = 1500, HEIGHT = 650;
        let player = { x: WIDTH/2, y: HEIGHT/2, size: 28, speed: 6.5, angle: 0, health: 100, lastShot: 0, lastHit: 0 };

        let bullets = [], enemies = [], particles = [], blackHoles = [], planets = [];
        let score = 0, wave = 1, currentGalaxy = 1, lastSpawn = Date.now(), spawnRate = 800;
        let gameRunning = true, onEarth = false;
        let highScore = localStorage.getItem('grokShooterHigh') || 0;

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        function playGunSound() { /* your original gun sound */ }
        function playExplosionSound(intensity = 1) { /* your original explosion sound */ }

        const keys = {};
        let mouseX = WIDTH/2, mouseY = HEIGHT/2, mouseDown = false;

        let stars = [];
        function generateBackground() {
            stars = [];
            for (let i = 0; i < 250; i++) stars.push({x:Math.random()*WIDTH, y:Math.random()*HEIGHT, size:Math.random()*3+0.5, speed:Math.random()*0.6+0.2});
            planets = [{x: WIDTH*0.7, y: HEIGHT*0.35, radius: 65, type: 'earth', color: '#2288ff'}]; // Earth
        }

        function spawnBlackHole() {
            if (blackHoles.length > 0 || onEarth) return;
            blackHoles.push({x: 300 + Math.random()*(WIDTH-600), y: 150 + Math.random()*(HEIGHT-300), radius: 48, pulse: 0});
        }

        function enterBlackHole() {
            currentGalaxy = (currentGalaxy % 3) + 1;
            document.getElementById('galaxy-text').textContent = `GALAXY ${currentGalaxy}`;
            document.getElementById('galaxy-text').style.opacity = 1;
            setTimeout(() => document.getElementById('galaxy-text').style.opacity = 0, 2000);
            enemies = []; bullets = [];
            generateBackground();
            wave = 1; spawnRate = 720; lastSpawn = Date.now();
            for (let i = 0; i < 5; i++) spawnEnemy();
        }

        function landOnEarth() {
            onEarth = true;
            enemies = []; bullets = []; blackHoles = [];
            document.getElementById('landing-text').style.display = 'block';
            setTimeout(() => document.getElementById('landing-text').style.display = 'none', 1800);
            
            // Cartoon Earth style
            ctx.fillStyle = '#113300';
            // Spawn cartoon enemies (zombies/aliens)
            for (let i = 0; i < 6; i++) {
                enemies.push({
                    x: 200 + Math.random()*(WIDTH-400),
                    y: 100 + Math.random()*(HEIGHT-200),
                    size: 35,
                    speed: 1.8,
                    health: 4,
                    color: '#00bb00',
                    type: 'earth'
                });
            }
        }

        function spawnEnemy() {
            if (onEarth) return;
            // normal spawn logic (same as before)
            const side = Math.floor(Math.random()*4);
            let ex = side===0||side===2 ? Math.random()*WIDTH : (side===1?WIDTH+50:-50);
            let ey = side===1||side===3 ? Math.random()*HEIGHT : (side===0?-50:HEIGHT+50);
            enemies.push({x:ex, y:ey, size:32, speed:2.3 + wave*0.3, health:2 + Math.floor(wave/2), color: currentGalaxy===1?'#ff0066':'#4488ff'});
        }

        // Rest of your update(), draw(), gameLoop(), etc. stay mostly same.
        // Just add these checks in update():

        // Inside update(), add this for Earth landing:
            // Planet collision (Earth)
            for (let p of planets) {
                if (p.type === 'earth' && Math.hypot(player.x - p.x, player.y - p.y) < p.radius + player.size/2) {
                    landOnEarth();
                }
            }

        // In draw(), draw Earth bigger and cartoon style:
            // Draw Earth
            for (let p of planets) {
                if (p.type === 'earth') {
                    ctx.shadowBlur = 50; ctx.shadowColor = '#44ff88';
                    ctx.fillStyle = '#2288ff';
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#00bb44';
                    ctx.beginPath(); ctx.arc(p.x-12, p.y-8, 28, 0, Math.PI*2); ctx.fill(); // continents
                }
            }

        // Call spawnBlackHole() after wave 3 as before

        gameLoop(); // start
    </script>
</body>
</html>
